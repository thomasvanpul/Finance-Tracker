kind = "web"
previewPath = "/"
title = "Personal Finance Tracker"
version = "1.0.0"
id = "artifacts/finance-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19051

[services.development]
run = "pnpm --filter @workspace/finance-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-tracker", "run", "build" ]
publicDir = "artifacts/finance-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19051"
BASE_PATH = "/"
