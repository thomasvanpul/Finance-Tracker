<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background for maskable (needs safe zone) -->
  <rect width="512" height="512" fill="#0D1117"/>
  <!-- Safe zone: inner 320x320 centered (80px margin each side) -->
  <!-- Left vertical stroke -->
  <line x1="168" y1="364" x2="168" y2="168" stroke="#E6EDF3" stroke-width="30" stroke-linecap="round"/>
  <!-- Diagonal -->
  <line x1="168" y1="364" x2="344" y2="168" stroke="#F4A21E" stroke-width="30" stroke-linecap="round"/>
  <!-- Right vertical stroke -->
  <line x1="344" y1="168" x2="344" y2="364" stroke="#E6EDF3" stroke-width="30" stroke-linecap="round"/>
  <!-- Peak dot -->
  <circle cx="344" cy="168" r="22" fill="#F4A21E"/>
  <!-- Baseline -->
  <line x1="148" y1="388" x2="364" y2="388" stroke="#F4A21E" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
</svg>
