<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#0D1117"/>
  <!-- Left vertical stroke -->
  <line x1="52" y1="130" x2="52" y2="50" stroke="#E6EDF3" stroke-width="13" stroke-linecap="round"/>
  <!-- Diagonal -->
  <line x1="52" y1="130" x2="128" y2="50" stroke="#F4A21E" stroke-width="13" stroke-linecap="round"/>
  <!-- Right vertical stroke -->
  <line x1="128" y1="50" x2="128" y2="130" stroke="#E6EDF3" stroke-width="13" stroke-linecap="round"/>
  <!-- Peak dot -->
  <circle cx="128" cy="50" r="9" fill="#F4A21E"/>
  <!-- Baseline -->
  <line x1="40" y1="142" x2="140" y2="142" stroke="#F4A21E" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
</svg>
