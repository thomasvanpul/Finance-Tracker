services:
  - type: web
    name: fintrack
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false
      - key: WISE_API_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_PASSWORD
        sync: false
